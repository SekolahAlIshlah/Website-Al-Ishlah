media:
  input: src/assets/images
  output: /assets/images

collections:
  - name: settings
    label: Global Settings
    type: file
    path: src/_data/settings.json
    fields:
      - { name: schoolName, label: School Name, type: string }
      - { name: levels, label: Education Levels, type: string }
      - { name: tagline, label: Hero Tagline, type: string }
      - { name: description, label: Hero Description, type: text }
      - { name: radioUrl, label: Radio Stream URL, type: string }
      - { name: whatsappNumber, label: WhatsApp Contact (Format: 62...), type: string }
      - { name: whatsappText, label: WhatsApp Message Text, type: string }
      - { name: ppdbYear, label: PPDB Year, type: string }
      - { name: ppdbOpen, label: PPDB Open Status, type: boolean }
      - name: contact
        label: Contact Details
        type: object
        fields:
          - { name: address, label: Address, type: string }
          - { name: phone, label: Phone, type: string }
          - { name: email, label: Email, type: string }
          - { name: operationalHoursWeekday, label: Operational Hours (Weekday), type: string }
          - { name: operationalHoursWeekend, label: Operational Hours (Weekend), type: string }

  - name: programs
    label: Educational Programs
    type: folder
    path: src/program
    format: md
    fields:
      - { name: title, label: Program Name (e.g. TKQ), type: string }
      - { name: fullName, label: Full Program Name, type: string }
      - { name: description, label: Short Description, type: text }
      - { name: ageRange, label: Age Range, type: string }
      - { name: color, label: Color Theme, type: select, options: [green, pink, blue] }
      - { name: image, label: Featured Image, type: image }
      - { name: body, label: Detail Curriculum, type: rich-text }

  - name: news
    label: News & Blog
    type: folder
    path: src/news
    format: md
    fields:
      - { name: title, label: Title, type: string }
      - { name: date, label: Date, type: date }
      - { name: image, label: Featured Image, type: image }
      - { name: summary, label: Summary, type: text }
      - { name: body, label: Body Content, type: rich-text }

  - name: teachers
    label: Teachers & Staffs
    type: folder
    path: src/teachers
    format: md
    fields:
      - { name: title, label: Full Name, type: string }
      - { name: role, label: Role / Position, type: string }
      - { name: subject, label: Subject Taught, type: string }
      - { name: photo, label: Photo URL / Image, type: image }
      - { name: order, label: Display Order, type: number }

  - name: gallery
    label: Gallery Activities
    type: folder
    path: src/gallery
    format: md
    fields:
      - { name: title, label: Event Title, type: string }
      - { name: date, label: Date, type: date }
      - { name: image, label: Gallery Image, type: image }
      - { name: category, label: Category, type: string }

  - name: faq
    label: FAQ Entries
    type: folder
    path: src/faq
    format: md
    fields:
      - { name: question, label: Question, type: string }
      - { name: answer, label: Answer, type: text }
      - { name: order, label: Display Order, type: number }

  - name: announcements
    label: Announcements
    type: folder
    path: src/announcements
    format: md
    fields:
      - { name: title, label: Announcement Title, type: string }
      - { name: content, label: Content Text, type: text }
      - { name: date, label: Date, type: date }
      - { name: active, label: Active Status, type: boolean }
